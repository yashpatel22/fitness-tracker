name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # GitHub Pages' deploy API occasionally returns "Deployment failed, try
      # again later" on rapid successive deploys. Auto-retry once so we don't
      # have to re-run the workflow by hand.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
